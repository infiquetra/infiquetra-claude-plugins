name: Test Infiquetra Plugins

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ${{ fromJSON(vars.WORKFLOW_RUNNER_LABELS || '"ubuntu-latest"') }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          pip install pytest pytest-cov pytest-mock requests pyyaml boto3

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=scripts --cov-report=xml --cov-report=term

      - name: Validate plugin formats
        run: |
          python3 scripts/validate_plugins.py

  lint:
    name: Lint and Format
    runs-on: ${{ fromJSON(vars.WORKFLOW_RUNNER_LABELS || '"ubuntu-latest"') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          pip install ruff mypy bandit

      - name: Run ruff
        run: |
          ruff check scripts/ tests/ || true

      - name: Run mypy  
        run: |
          mypy scripts/ --ignore-missing-imports || true
