name: Validate Plugins

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'marketplace/**'
      - '.github/workflows/validate-plugins.yml'
  push:
    branches:
      - main
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'marketplace/**'

jobs:
  validate:
    name: Validate Plugin Changes
    runs-on: ${{ fromJSON(vars.WORKFLOW_RUNNER_LABELS || '"ubuntu-latest"') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml requests boto3
          pip install pytest pytest-cov ruff mypy bandit

      - name: Validate marketplace registry
        run: |
          echo "::group::Validating marketplace.json"
          python3 marketplace/validator/validate.py
          echo "::endgroup::"

      - name: Get changed plugins
        id: changed
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get list of changed plugin directories
          changed_files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          plugins=$(echo "$changed_files" | grep '^plugins/' | cut -d'/' -f2 | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')
          echo "plugins=$plugins" >> $GITHUB_OUTPUT
          echo "Changed plugins: $plugins"

      - name: Run plugin tests
        if: steps.changed.outputs.plugins != ''
        env:
          CHANGED_PLUGINS: ${{ steps.changed.outputs.plugins }}
        run: |
          echo "::group::Running Plugin Tests"
          IFS=',' read -ra PLUGIN_ARRAY <<< "$CHANGED_PLUGINS"
          for plugin in "${PLUGIN_ARRAY[@]}"; do
            if [ -d "plugins/$plugin/tests" ]; then
              echo "Testing $plugin..."
              cd "plugins/$plugin"
              if [ -f "requirements-dev.txt" ]; then
                pip install -r requirements-dev.txt
              fi
              if [ -f "requirements.txt" ]; then
                pip install -r requirements.txt
              fi
              pytest tests/ -v --cov=src --cov-report=term-missing || true
              cd ../..
            fi
          done
          echo "::endgroup::"

      - name: Security scan
        run: |
          echo "::group::Security Scan"
          bandit -r plugins/ -ll -f json -o bandit-report.json || true
          if [ -f bandit-report.json ]; then
            cat bandit-report.json
          fi
          echo "::endgroup::"

      - name: Lint plugins
        run: |
          echo "::group::Linting"
          ruff check plugins/ --output-format=github || true
          echo "::endgroup::"

      - name: Type check
        run: |
          echo "::group::Type Checking"
          for plugin in plugins/*/; do
            if [ -d "$plugin/src" ]; then
              echo "Type checking $(basename $plugin)..."
              mypy "$plugin/src" --ignore-missing-imports || true
            fi
          done
          echo "::endgroup::"

      - name: Validation summary
        run: |
          echo "## Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Marketplace registry validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Plugin manifests validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests executed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security scan completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Linting completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type checking completed" >> $GITHUB_STEP_SUMMARY
